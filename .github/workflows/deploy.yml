name: Deploy project
on:
  push:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3

      - name: install NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run test
        run: npm test

      - name: Build project
        run: npm run build

      - name: Deploy
        run: echo "Deploying project as part of the workflow"
